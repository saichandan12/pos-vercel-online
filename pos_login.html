<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Pro — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0c10;
            color: white;
            overflow: hidden;
        }

        /* Ambient glow */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(99, 102, 241, 0.15) 0%, transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            right: -20%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .page-layout {
            display: flex;
            width: 100%;
            max-width: 900px;
            min-height: 520px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
            z-index: 1;
        }

        /* Left branding panel */
        .brand-panel {
            flex: 1;
            background: linear-gradient(145deg, #1a1d2e 0%, #0f1117 100%);
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .brand-logo-text {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem 0;
        }

        .brand-tagline {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
            color: #fff;
            margin-bottom: 1rem;
        }

        .brand-tagline span {
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand-sub {
            font-size: 14px;
            color: #64748b;
            line-height: 1.6;
        }

        .role-badges {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 2rem;
        }

        .role-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 13px;
            color: #94a3b8;
        }

        .role-badge-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .brand-footer {
            font-size: 12px;
            color: #374151;
        }

        /* Right login panel */
        .login-panel {
            width: 380px;
            background: #111318;
            padding: 3rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .login-subtitle {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 2rem;
        }

        /* Role selector */
        .role-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 1.5rem;
        }

        .role-card {
            padding: 12px 6px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            text-align: center;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .role-card:hover {
            border-color: rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
        }

        .role-card.active {
            border-color: rgba(99, 102, 241, 0.6);
            background: rgba(99, 102, 241, 0.1);
        }

        .role-card.active .role-card-icon {
            opacity: 1;
        }

        .role-card-icon {
            font-size: 20px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .role-card-label {
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .role-card.active .role-card-label {
            color: #a5b4fc;
        }

        /* Form */
        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: white;
            background: rgba(255, 255, 255, 0.03);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input::placeholder {
            color: #374151;
        }

        .form-group input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        /* Error message */
        .error-msg {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .error-msg.show {
            display: block;
        }

        .success-msg {
            display: none;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .success-msg.show {
            display: block;
        }

        /* Register link */
        .register-container {
            margin-top: 1.5rem;
            text-align: center;
        }

        .register-link {
            color: #6366f1;
            font-size: 13px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .register-link:hover {
            text-decoration: underline;
        }

        .form-group.hidden {
            display: none;
        }

        /* Submit */
        .login-btn {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 0.5rem;
            position: relative;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .login-btn:active {
            transform: scale(0.99);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-btn .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto;
        }

        .login-btn.loading span {
            display: none;
        }

        .login-btn.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .default-creds {
            margin-top: 1.5rem;
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .default-creds-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #374151;
            margin-bottom: 8px;
        }

        .cred-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #4b5563;
            padding: 3px 0;
        }

        .cred-row code {
            color: #6b7280;
            font-family: monospace;
        }
    </style>
</head>

<body>
    <div class="page-layout">
        <!-- Branding Panel -->
        <div class="brand-panel">
            <div class="brand-logo">
                <div class="brand-logo-icon">🍽️</div>
                <div class="brand-logo-text">POS PRO</div>
            </div>

            <div class="brand-body">
                <h1 class="brand-tagline">India's Smart<br><span>Restaurant POS</span></h1>
                <p class="brand-sub">Fast, offline-ready billing with full<br>role-based access control.</p>


            </div>


        </div>

        <!-- Login Panel -->
        <div class="login-panel">
            <h2 class="login-title">Welcome back</h2>
            <p class="login-subtitle">Sign in to your account to continue</p>

            <div class="error-msg" id="errorMsg"></div>
            <div class="success-msg" id="successMsg"></div>

            <form id="authForm">
                <div class="form-group hidden" id="nameGroup">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username" required
                        autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="login-btn" id="submitBtn">
                    <span id="submitBtnText">Sign In</span>
                    <div class="spinner"></div>
                </button>
            </form>

            <div class="register-container">
                <span id="toggleText">New here? </span>
                <span class="register-link" id="toggleAuthMode">Create Staff Account</span>
            </div>
        </div>
    </div>

    <script>
        let isLoginMode = true;
        const authForm = document.getElementById('authForm');
        const submitBtn = document.getElementById('submitBtn');
        const submitBtnText = document.getElementById('submitBtnText');
        const toggleAuthMode = document.getElementById('toggleAuthMode');
        const toggleText = document.getElementById('toggleText');
        const nameGroup = document.getElementById('nameGroup');
        const errorEl = document.getElementById('errorMsg');
        const successEl = document.getElementById('successMsg');
        const loginTitle = document.querySelector('.login-title');
        const loginSubtitle = document.querySelector('.login-subtitle');

        toggleAuthMode.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            if (isLoginMode) {
                loginTitle.textContent = 'Welcome back';
                loginSubtitle.textContent = 'Sign in to your account to continue';
                submitBtnText.textContent = 'Sign In';
                toggleText.textContent = 'New here? ';
                toggleAuthMode.textContent = 'Create Staff Account';
                nameGroup.classList.add('hidden');
                document.getElementById('name').required = false;
            } else {
                loginTitle.textContent = 'Register Staff';
                loginSubtitle.textContent = 'Create a new account for billing staff';
                submitBtnText.textContent = 'Create Account';
                toggleText.textContent = 'Already have an account? ';
                toggleAuthMode.textContent = 'Sign In';
                nameGroup.classList.remove('hidden');
                document.getElementById('name').required = true;
                document.getElementById('name').focus();
            }
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value.trim();

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            errorEl.classList.remove('show');
            successEl.classList.remove('show');

            try {
                const endpoint = isLoginMode ? '/api/login' : '/api/register';
                const body = isLoginMode ? { username, password } : { username, password, name };

                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (data.success) {
                    if (isLoginMode) {
                        sessionStorage.setItem('pos_user', JSON.stringify({
                            name: data.name,
                            role: data.role,
                            username: data.username
                        }));
                        window.location.href = data.role === 'staff' ? 'billing.html' : 'admin.html';
                    } else {
                        successEl.textContent = 'Staff account created! You can now sign in.';
                        successEl.classList.add('show');
                        submitBtn.classList.remove('loading');
                        submitBtn.disabled = false;
                        // Switch back to login mode
                        setTimeout(() => { toggleAuthMode.click(); }, 1500);
                    }
                } else {
                    errorEl.textContent = data.message || 'Error occurred.';
                    errorEl.classList.add('show');
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                }
            } catch (err) {
                errorEl.textContent = 'Cannot connect to server.';
                errorEl.classList.add('show');
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
